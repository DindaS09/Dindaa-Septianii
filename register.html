<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | BoluKu</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="left">

        <h1>BoluKu</h1>

        <p>
            Daftarkan akunmu dan nikmati berbagai pilihan bolu premium yang lezat setiap hari.
        </p>

        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=700" alt="Bolu">

    </div>

    <div class="right">

        <form id="registerForm">

            <h2>Daftar Akun</h2>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="text" id="telepon" placeholder="Nomor HP" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="konfirmasi" placeholder="Konfirmasi Password" required>
            </div>

            <button type="submit">Daftar</button>

            <p class="register">
                Sudah punya akun?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

<script src="register.js"></script>

</body>
</html>
