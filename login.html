<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BoluKu</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="left">

        <h1>BoluKu</h1>

        <p>
            Selamat datang kembali.
            Masuk untuk menikmati berbagai bolu premium favoritmu.
        </p>

        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=700" alt="Cake">

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Masukkan Email"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Masukkan Password"
                required>

            </div>

            <button type="submit">
                Login
            </button>

            <p class="register">
                Belum punya akun?

                <a href="register.html">
                    Daftar Sekarang
                </a>
            </p>

        </form>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
